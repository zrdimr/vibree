name: Vibree
options:
  bundleIdPrefix: com.example
targets:
  Vibree:
    type: application
    platform: iOS
    deploymentTarget: 15.0
    sources: 
      - path: Vibree
    info:
      path: Info.plist
      properties:
        CFBundleVersion: 1
        CFBundleShortVersionString: 1.0
    settings:
      base:
        SWIFT_VERSION: 5
        SWIFT_OBJC_BRIDGING_HEADER: Vibree/Vibree-Bridging-Header.h
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        HEADER_SEARCH_PATHS: 
          - $(inherited)
        LIBRARY_SEARCH_PATHS: 
          - $(inherited)
        OTHER_LDFLAGS: 
          - $(inherited)
        GCC_PREPROCESSOR_DEFINITIONS: 
          - $(inherited)
