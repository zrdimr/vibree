name: Vibree
options:
  bundleIdPrefix: com.example
targets:
  Vibree:
    type: application
    platform: iOS
    deploymentTarget: 15.0
    sources: 
      - path: Vibree
    info:
      path: Info.plist
      properties:
        CFBundleVersion: 1
        CFBundleShortVersionString: 1.0
    settings:
      base:
        SWIFT_VERSION: 5
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"
        ARCHS: "arm64"
        ONLY_ACTIVE_ARCH: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": "x86_64"
        SWIFT_OBJC_BRIDGING_HEADER: Vibree/Vibree-Bridging-Header.h
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        HEADER_SEARCH_PATHS: 
          - $(inherited)
        LIBRARY_SEARCH_PATHS: 
          - $(inherited)
        OTHER_LDFLAGS: 
          - $(inherited)
        OTHER_CFLAGS:
          - $(inherited)
          - "-std=c++17"
        OTHER_CPLUSPLUSFLAGS:
          - $(inherited)
          - "-std=c++17"
        OTHER_SWIFT_FLAGS:
          - $(inherited)
          - "-Xcc"
          - "-std=c++17"
        GCC_PREPROCESSOR_DEFINITIONS: 
          - $(inherited)
