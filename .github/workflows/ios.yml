name: iOS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download ML Models from Google Drive
        run: |
          pip3 install --break-system-packages gdown
          mkdir -p ios/Vibree/Vibree/Resources
          gdown "1Gbtipohnlm3MUqr6q3A2-9XPqSmF1b4r" -O ios/Vibree/Vibree/Resources/hrv_model.ptl
          gdown "1Pm1AHtSkY5lyx4KEvIvpPl3jCCN3mcXS" -O ios/Vibree/Vibree/Resources/nlp_model.ptl
          gdown "1dQVTk5MRrYivX5QLv-nCj46UFRIn9qtT" -O ios/Vibree/Vibree/Resources/vocab.txt
          ls -lh ios/Vibree/Vibree/Resources/

      - name: Build
        run: |
          # Install XcodeGen
          brew install xcodegen
          
          # 1. Generate Xcode project FIRST
          cd ios/Vibree
          xcodegen generate
          
          # 2. Add explicit wipe of DerivedData and Pods cache
          rm -rf ~/Library/Developer/Xcode/DerivedData
          pod cache clean --all
          pod install
          
          # 3. Build using xcworkspace (created by pod install)
          xcodebuild -workspace Vibree.xcworkspace \
            -scheme Vibree \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CLANG_CXX_LANGUAGE_STANDARD="c++17" \
            CLANG_CXX_LIBRARY="libc++" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
            
      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: Vibree.app
          path: ios/Vibree/build/Build/Products/Debug-iphonesimulator/Vibree.app
