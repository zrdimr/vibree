# Build Trigger
name: iOS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download ML Models from Google Drive
        run: |
          pip3 install --break-system-packages gdown
          mkdir -p ios/Vibree/Vibree/Resources
          gdown "1Gbtipohnlm3MUqr6q3A2-9XPqSmF1b4r" -O ios/Vibree/Vibree/Resources/hrv_model.ptl
          gdown "1Pm1AHtSkY5lyx4KEvIvpPl3jCCN3mcXS" -O ios/Vibree/Vibree/Resources/nlp_model.ptl
          gdown "1dQVTk5MRrYivX5QLv-nCj46UFRIn9qtT" -O ios/Vibree/Vibree/Resources/vocab.txt
          ls -lh ios/Vibree/Vibree/Resources/

      - name: Build
        run: |
          # Install XcodeGen
          brew install xcodegen
          
          # 1. Generate Xcode project FIRST
          cd ios/Vibree
          xcodegen generate
          
          # 2. Add explicit wipe of DerivedData and Pods cache
          rm -rf ~/Library/Developer/Xcode/DerivedData
          pod cache clean --all
          pod install
          
          # 3. Environment Diagnostics
          xcodebuild -version
          xcodebuild -showsdks
          
          # 4. Build using xcworkspace
          set -o pipefail
          xcodebuild clean build -workspace Vibree.xcworkspace \
            -scheme Vibree \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO 2>&1 | tee xcodebuild.log || { 
              echo "iPhone 16 not found, falling back to iPhone 15"
              xcodebuild clean build -workspace Vibree.xcworkspace \
                -scheme Vibree \
                -configuration Debug \
                -destination 'platform=iOS Simulator,name=iPhone 15' \
                -derivedDataPath build \
                ARCHS="arm64" \
                ONLY_ACTIVE_ARCH=YES \
                CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO 2>&1 | tee xcodebuild.log || { cat xcodebuild.log; exit 1; }
            }
            
      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: ios/Vibree/xcodebuild.log

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: Vibree.app
          path: ios/Vibree/build/Build/Products/Debug-iphonesimulator/Vibree.app
