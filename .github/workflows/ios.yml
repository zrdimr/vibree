name: "Build iOS app"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Vibree
    runs-on: macos-15
    steps:
      - name: check Xcode version
        run: /usr/bin/xcodebuild -version

      - name: checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Download ML Models from Google Drive
        run: |
          pip3 install --break-system-packages gdown
          mkdir -p ios/Vibree/Vibree/Resources
          gdown "1Gbtipohnlm3MUqr6q3A2-9XPqSmF1b4r" -O ios/Vibree/Vibree/Resources/hrv_model.ptl
          gdown "1Pm1AHtSkY5lyx4KEvIvpPl3jCCN3mcXS" -O ios/Vibree/Vibree/Resources/nlp_model.ptl
          gdown "1dQVTk5MRrYivX5QLv-nCj46UFRIn9qtT" -O ios/Vibree/Vibree/Resources/vocab.txt
          ls -lh ios/Vibree/Vibree/Resources/

      - name: Install Dependencies
        run: |
          brew install xcodegen
          cd ios/Vibree
          xcodegen generate
          pod cache clean --all
          pod install

      - name: Build for Simulator
        id: build_simulator
        run: |
          cd ios/Vibree
          set -o pipefail
          xcodebuild clean build -workspace Vibree.xcworkspace \
            -scheme Vibree \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tee xcodebuild.log || { cat xcodebuild.log; exit 1; }

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: Vibree-Simulator-App
          path: ios/Vibree/build/Build/Products/Debug-iphonesimulator/Vibree.app
          retention-days: 3

  build_unsigned_ipa:
    name: Build Unsigned IPA for Device Testing
    runs-on: macos-15
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Download ML Models from Google Drive
        run: |
          pip3 install --break-system-packages gdown
          mkdir -p ios/Vibree/Vibree/Resources
          gdown "1Gbtipohnlm3MUqr6q3A2-9XPqSmF1b4r" -O ios/Vibree/Vibree/Resources/hrv_model.ptl
          gdown "1Pm1AHtSkY5lyx4KEvIvpPl3jCCN3mcXS" -O ios/Vibree/Vibree/Resources/nlp_model.ptl
          gdown "1dQVTk5MRrYivX5QLv-nCj46UFRIn9qtT" -O ios/Vibree/Vibree/Resources/vocab.txt

      - name: Install Dependencies
        run: |
          brew install xcodegen
          cd ios/Vibree
          xcodegen generate
          pod install

      - name: Build Unsigned Release App
        run: |
          cd ios/Vibree
          xcodebuild clean build -workspace Vibree.xcworkspace \
            -scheme Vibree \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          cd ios/Vibree
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Vibree.app Payload/
          zip -qr Vibree-unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vibree-Unsigned-IPA
          path: ios/Vibree/Vibree-unsigned.ipa
          retention-days: 7

